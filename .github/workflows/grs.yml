name: Update README cards
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=xmfcx&show_icons=true&show=reviews,discussions_started,discussions_answered,prs_merged,prs_merged_percentage&title_color=ffffff&text_color=ffffff&icon_color=ffffff&bg_color=0,ff00aa,ffd500"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate top langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=xmfcx&hide=fortran,html,makefile"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          COMMIT_MSG="ci: update readme cards"
          LAST_MSG=$(git log -1 --pretty=%s)
          if [ "$LAST_MSG" = "$COMMIT_MSG" ]; then
            git commit --amend -m "$COMMIT_MSG"
            git push --force-with-lease
          else
            git commit -m "$COMMIT_MSG"
            git push
          fi
